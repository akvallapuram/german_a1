  .filter-btn.active { background: #7F77DD; color: #fff; border-color: #7F77DD; }

  .card-face { position: absolute; inset: 0; -webkit-backface-visibility: hidden; backface-visibility: hidden; border: 1px solid #e0dfd9; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; background: #fff; }

  .btn-wrong { color: #c0442a; border-color: #e8c4ba; }
  .btn-wrong:hover { background: #fdf1ee; }
  .btn-right { color: #1a8060; border-color: #b0d9ca; }
  .btn-right:hover { background: #edf7f3; }
  .meta { display: flex; justify-content: space-between; max-width: 540px; margin: 0 auto; font-size: 13px; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-know { background: #e1f5ee; color: #0f6e56; }
  .badge-learn { background: #faeae7; color: #993c1d; }

  .summary-icon { font-size: 48px; margin-bottom: 1rem; }
  .summary h2 { font-size: 20px; font-weight: 500; margin-bottom: 0.5rem; }

<body>

<h1>Start Deutsch 1 &mdash; Wortliste</h1>
<p class="subtitle" id="subtitle">German Flashcards A-Z</p>

<div class="top-bar">
  <span class="counter" id="counter">Card 1 of ...</span>
  <div class="top-controls">
    <button class="filter-btn" onclick="toggleFilter()">Filter</button>
    <button class="shuffle-btn" onclick="shuffle()">Shuffle</button>
    <button class="filter-btn" id="hideViewedBtn" onclick="toggleHideViewed()">Hide Viewed</button>
    <button class="clear-btn" id="clearViewedBtn" onclick="clearViewed()" style="display:none">Clear Viewed</button>
  </div>
</div>

<div class="section-picker" id="sectionPicker"></div>

<div class="progress-bg">
  <div class="progress-fill" id="progress" style="width:0%"></div>
</div>

<div class="card-area" id="cardArea" onclick="flipCard()">
  <div class="card-inner" id="cardInner">
    <div class="card-face card-front">
      <div class="card-hint">English &mdash; tap to reveal</div>
      <div class="card-word" id="frontWord"></div>
    </div>
    <div class="card-face card-back">
      <div class="card-hint">Deutsch</div>
      <div class="card-word" id="backWord"></div>
      <div class="card-example" id="backExample"></div>
    </div>
  </div>
</div>

<div class="controls" id="controls">
  <button class="btn btn-wrong" onclick="mark(false)">&cross; Still learning</button>
  <button class="btn btn-right" onclick="mark(true)">&check; Got it</button>
</div>

<div class="meta">
  <span><span class="badge badge-know" id="knowCount">0 know</span></span>
  <span><span class="badge badge-viewed" id="viewedCount">0 viewed</span></span>
  <span><span class="badge badge-learn" id="learnCount">0 learning</span></span>
</div>

<div class="review-bar" id="reviewBar">
  <span class="review-bar-text"><strong id="reviewCount">0</strong> cards to review</span>
  <div class="review-bar-btns">
    <button class="review-bar-btn primary" onclick="reviewLearning()">Review now</button>
    <button class="clear-btn" onclick="clearLearning()">Clear</button>
    <button class="review-bar-btn" id="backFullBtn" onclick="backToFullDeck()" style="display:none">← Full deck</button>
  </div>
</div>

<div class="summary" id="summary">
  <div class="summary-icon">&#127881;</div>
  <h2>Round complete!</h2>
  <p id="summaryText"></p>
  <button class="restart-btn" id="reviewBtn" onclick="reviewLearning()" style="display:none;background:#faeae7;color:#993c1d;border-color:#e8c4ba">Review learning cards</button>
  <button class="restart-btn" onclick="restart()">Go again (full deck)</button>
</div>

/* -- State -- */
var deck = allCards.slice();
var idx = 0, know = 0, learning = 0, flipped = false;
var learningList = loadLearning();
var filterOpen = false;
var activeSections = {};
var reviewing = false;
var viewedSet = loadViewed();
var hideViewed = false;

/* -- localStorage helpers -- */
function saveLearning() {
  try {
    var keys = learningList.map(function(c) { return c.de; });
    localStorage.setItem('sd1_learning', JSON.stringify(keys));
  } catch(e) {}
}
function loadLearning() {
  try {
    var raw = localStorage.getItem('sd1_learning');
    if (!raw) return [];
    var keys = JSON.parse(raw);
    var result = [];
    for (var i = 0; i < keys.length; i++) {
      for (var j = 0; j < allCards.length; j++) {
        if (allCards[j].de === keys[i]) { result.push(allCards[j]); break; }
      }
    }
    return result;
  } catch(e) { return []; }
}
function updateReviewBar() {
  var bar = document.getElementById('reviewBar');
  var countEl = document.getElementById('reviewCount');
  var backBtn = document.getElementById('backFullBtn');
  if (learningList.length > 0 || reviewing) {
    bar.classList.add('visible');
    countEl.textContent = learningList.length;
  } else {
    bar.classList.remove('visible');
  }
  if (backBtn) backBtn.style.display = reviewing ? 'inline-block' : 'none';
}
function clearLearning() {
  learningList = [];
  saveLearning();
  updateReviewBar();
}

/* -- Viewed helpers -- */
function saveViewed() {
  try {
    var keys = [];
    for (var k in viewedSet) { if (viewedSet[k]) keys.push(k); }
    localStorage.setItem('sd1_viewed', JSON.stringify(keys));
  } catch(e) {}
}
function loadViewed() {
  try {
    var raw = localStorage.getItem('sd1_viewed');
    if (!raw) return {};
    var keys = JSON.parse(raw);
    var result = {};
    for (var i = 0; i < keys.length; i++) { result[keys[i]] = true; }
    return result;
  } catch(e) { return {}; }
}
function updateViewedBadge() {
  var count = 0;
  for (var k in viewedSet) { if (viewedSet[k]) count++; }
  document.getElementById('viewedCount').textContent = count + ' viewed';
  var clearBtn = document.getElementById('clearViewedBtn');
  if (clearBtn) clearBtn.style.display = (hideViewed || count > 0) ? '' : 'none';
}
function toggleHideViewed() {
  hideViewed = !hideViewed;
  var btn = document.getElementById('hideViewedBtn');
  if (hideViewed) { btn.classList.add('active'); } else { btn.classList.remove('active'); }
  updateViewedBadge();
  applyFilter();
}
function clearViewed() {
  viewedSet = {};
  saveViewed();
  updateViewedBadge();
  if (hideViewed) applyFilter();
}

/* -- Sections -- */
var allSections = [];
(function(){
  var seen = {};
  for (var i = 0; i < allCards.length; i++) {
    if (!seen[allCards[i].sec]) { seen[allCards[i].sec] = true; allSections.push(allCards[i].sec); }
  }
})();

function countActive() {
  var n = 0; for (var k in activeSections) { if (activeSections[k]) n++; } return n;
}

function buildSectionPicker() {
  var el = document.getElementById('sectionPicker');
  el.innerHTML = '';
  var nActive = countActive();
  var allTag = document.createElement('span');
  allTag.className = 'section-tag' + (nActive === 0 ? ' active' : '');
  allTag.textContent = 'All (' + allCards.length + ')';
  allTag.onclick = function() { activeSections = {}; applyFilter(); };
  el.appendChild(allTag);
  for (var i = 0; i < allSections.length; i++) {
    (function(s) {
      var count = 0;
      for (var j = 0; j < allCards.length; j++) { if (allCards[j].sec === s) count++; }
      var tag = document.createElement('span');
      tag.className = 'section-tag' + (activeSections[s] ? ' active' : '');
      tag.textContent = s + ' (' + count + ')';
      tag.onclick = function() {
        if (activeSections[s]) delete activeSections[s]; else activeSections[s] = true;
        applyFilter();
      };
      el.appendChild(tag);
    })(allSections[i]);
  }
}

function toggleFilter() {
  filterOpen = !filterOpen;
  var picker = document.getElementById('sectionPicker');
  var btn = document.querySelector('.filter-btn');
  if (filterOpen) { picker.classList.add('visible'); btn.classList.add('active'); }
  else { picker.classList.remove('visible'); btn.classList.remove('active'); }
}

function buildSectionDeck() {
  var nActive = countActive();
  if (nActive === 0) { return allCards.slice(); }
  var result = [];
  for (var i = 0; i < allCards.length; i++) {
    if (activeSections[allCards[i].sec]) result.push(allCards[i]);
  }
  return result;
}

function applyFilter() {
  var sectionDeck = buildSectionDeck();
  if (hideViewed) {
    var filtered = [];
    for (var fi = 0; fi < sectionDeck.length; fi++) {
      if (!viewedSet[sectionDeck[fi].de]) filtered.push(sectionDeck[fi]);
    }
    if (filtered.length === 0) {
      deck = sectionDeck;
      document.getElementById('subtitle').textContent = 'All cards have been viewed! Clear Viewed to see them again.';
    } else {
      deck = filtered;
      document.getElementById('subtitle').textContent = 'German Flashcards A\u2013Z  \u00b7  ' + deck.length + ' cards';
    }
  } else {
    deck = sectionDeck;
    document.getElementById('subtitle').textContent = 'German Flashcards A\u2013Z  \u00b7  ' + deck.length + ' cards';
  }
  idx = 0; know = 0; learning = 0; flipped = false;
  document.getElementById('summary').style.display = 'none';
  document.getElementById('cardArea').style.display = 'block';
  document.getElementById('controls').style.display = 'flex';
  buildSectionPicker();
  updateCard();
}

function shuffle() {
  var base = buildSectionDeck();
  if (hideViewed) {
    var filtered = [];
    for (var fi = 0; fi < base.length; fi++) {
      if (!viewedSet[base[fi].de]) filtered.push(base[fi]);
    }
    if (filtered.length > 0) base = filtered;
  }
  deck = base;
  for (var i = deck.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = deck[i]; deck[i] = deck[j]; deck[j] = tmp;
  }
  idx = 0; know = 0; learning = 0; flipped = false;
  document.getElementById('summary').style.display = 'none';
  document.getElementById('cardArea').style.display = 'block';
  document.getElementById('controls').style.display = 'flex';
  updateCard();
}

function updateCard() {
  var ci = document.getElementById('cardInner');
  // Disable transition so the reset to front is instant (no reverse-flip flash)
  ci.style.transition = 'none';
  ci.classList.remove('flipped');
  flipped = false;
  document.getElementById('controls').classList.remove('visible');
  var card = deck[idx];
  document.getElementById('frontWord').textContent = card.en;
  document.getElementById('backWord').textContent = card.de;
  document.getElementById('backExample').textContent = card.ex;
  document.getElementById('counter').textContent = 'Card ' + (idx + 1) + ' of ' + deck.length;
  document.getElementById('progress').style.width = ((idx / deck.length) * 100) + '%';
  document.getElementById('knowCount').textContent = know + ' know';
  document.getElementById('learnCount').textContent = learning + ' learning';
  // Force layout reflow, then re-enable transition for the next flip
  void ci.offsetHeight;
  ci.style.transition = '';
}

function flipCard() {
  if (!flipped) {
    document.getElementById('cardInner').classList.add('flipped');
    flipped = true;
    document.getElementById('controls').classList.add('visible');
    viewedSet[deck[idx].de] = true;
    saveViewed();
    updateViewedBadge();
  }
}

function mark(correct) {
  if (correct) {
    know++;
    if (reviewing) {
      learningList = learningList.filter(function(c) { return c.de !== deck[idx].de; });
      saveLearning();
      updateReviewBar();
    }
  } else {
    learning++;
    // avoid duplicates in learningList
    var dominated = false;
    for (var i = 0; i < learningList.length; i++) {
      if (learningList[i].de === deck[idx].de) { dominated = true; break; }
    }
    if (!dominated) learningList.push(deck[idx]);
    saveLearning();
    updateReviewBar();
  }
  idx++;
  if (idx >= deck.length) showSummary();
  else updateCard();
}

function showSummary() {
  document.getElementById('cardArea').style.display = 'none';
  document.getElementById('controls').style.display = 'none';
  document.getElementById('progress').style.width = '100%';
  document.getElementById('counter').textContent = 'Done! ' + deck.length + ' cards';
  document.getElementById('summary').style.display = 'block';
  document.getElementById('summaryText').textContent =
    'You knew ' + know + ' out of ' + deck.length + ' cards. Still learning: ' + learning + '.';
  var reviewBtn = document.getElementById('reviewBtn');
  if (learningList.length > 0) {
    reviewBtn.style.display = 'inline-block';
    reviewBtn.textContent = 'Review ' + learningList.length + ' learning cards';
  } else {
    reviewBtn.style.display = 'none';
  }
  updateReviewBar();
}

function reviewLearning() {
  if (learningList.length === 0) return;
  deck = learningList.slice();
  idx = 0; know = 0; learning = 0; flipped = false;
  reviewing = true;
  document.getElementById('summary').style.display = 'none';
  document.getElementById('cardArea').style.display = 'block';
  document.getElementById('controls').style.display = 'flex';
  document.getElementById('subtitle').textContent = 'Reviewing \u2013 ' + deck.length + ' cards to learn';
  document.getElementById('counter').textContent = 'Card 1 of ' + deck.length;
  updateReviewBar();
  updateCard();
}

function restart() {
  idx = 0; know = 0; learning = 0; flipped = false;
  reviewing = false;
  document.getElementById('summary').style.display = 'none';
  document.getElementById('cardArea').style.display = 'block';
  document.getElementById('controls').style.display = 'flex';
  updateReviewBar();
  updateCard();
}

function backToFullDeck() {
  reviewing = false;
  applyFilter();
}

/* -- Keyboard shortcuts -- */
document.addEventListener('keydown', function(e) {
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
  if (flipped && (e.key === 'ArrowLeft' || e.key === '1')) mark(false);
  if (flipped && (e.key === 'ArrowRight' || e.key === '2')) mark(true);
});

/* -- Init -- */
document.getElementById('subtitle').textContent = 'German Flashcards A\u2013Z  \u00b7  ' + allCards.length + ' cards';
buildSectionPicker();
updateReviewBar();
updateViewedBadge();
updateCard();
</script>
